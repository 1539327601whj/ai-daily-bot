name: AI 每日高价值简报

on:
 # schedule:
    #- cron: '0 23 * * *'   # UTC 23点 = 北京时间次日7点（提前1小时）
    #- cron: '0 11 * * *'   # UTC 11点 = 北京时间19点（提前1小时）
  workflow_dispatch:
    inputs:
      edition:
        description: '选择版本'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install -r requirements.txt -q
      - name: 生成 AI 简报 & 推送
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          EDITION: ${{ github.event.inputs.edition || 'auto' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/daily_report.py
