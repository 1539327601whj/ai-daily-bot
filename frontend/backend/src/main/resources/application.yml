spring:
  application:
    name: ai-daily-backend

  datasource:
    # TiDB Serverless 默认端口 4000，启用 SSL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:4000}/${DB_NAME:ai_daily}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=true&sslMode=VERIFY_IDENTITY&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${SERVER_PORT:8081}

# 允许 GitHub Actions 跨域调用（开发时放开，生产环境建议配置具体域名）
allowed-origins: ${ALLOWED_ORIGINS:*}

# DeepSeek API 配置（用于 AI 对话功能）
deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}